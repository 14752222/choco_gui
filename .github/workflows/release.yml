name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Copy build output to installer
        shell: pwsh
        run: |
          $appDir = "installer\app"
          New-Item -ItemType Directory -Force -Path $appDir | Out-Null
          Copy-Item -Recurse -Force "build\windows\x64\runner\Release\*" $appDir

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "installer\choco_gui_setup.iss"

      - name: Set release variables
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $installerPath = Get-ChildItem "installer\output\ChocoGUI_Setup_*.exe" | Select-Object -First 1
          echo "INSTALLER=$($installerPath.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($installerPath.Name)" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.INSTALLER }}
          body: |
            ## Choco GUI ${{ github.ref_name }}

            ### 安装方法
            1. 下载 `${{ env.INSTALLER_NAME }}`
            2. 双击运行安装程序（需要管理员权限）
            3. 按照安装向导完成安装

            ### 更新日志
            详见 [CHANGELOG.md](https://github.com/14752222/choco_gui/blob/master/CHANGELOG.md)

            ---

            ### Installation
            1. Download `${{ env.INSTALLER_NAME }}`
            2. Double-click to run the installer (Admin rights required)
            3. Follow the setup wizard to complete installation

            ### Changelog
            See [CHANGELOG.md](https://github.com/14752222/choco_gui/blob/master/CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
